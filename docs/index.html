<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jerry & Hsuan — 旅行計劃</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #fff;
      --border: #e4e2dc;
      --text: #1a1a1a;
      --muted: #888;
      --okinawa: #0d9488;
      --oceania: #7c5cbf;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 64px 24px 80px;
      flex: 1;
    }

    header { margin-bottom: 52px; }

    .header-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .badge {
      display: inline-block;
      background: #eeecea;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 9px;
      font-size: 0.75rem;
      font-family: monospace;
      color: var(--muted);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── TRIP CARDS ── */
    .trips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 540px) {
      .trips { grid-template-columns: 1fr; }
      h1 { font-size: 1.5rem; }
    }

    .trip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: box-shadow 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .trip-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }

    .trip-card.okinawa::before { background: var(--okinawa); }
    .trip-card.oceania::before { background: var(--oceania); }

    .trip-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    .trip-emoji { font-size: 2rem; line-height: 1; }

    .trip-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .trip-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .trip-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .meta-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: #555;
      background: var(--bg);
    }

    .tag.okinawa-tag { border-color: #99f6e4; background: #f0fdfb; color: var(--okinawa); }
    .tag.oceania-tag { border-color: #ddd6fe; background: #f5f3ff; color: var(--oceania); }

    .trip-link {
      margin-top: auto;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .trip-card.okinawa .trip-link { color: var(--okinawa); }
    .trip-card.oceania .trip-link { color: var(--oceania); }

    .route-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f2f1ee;
      color: #555;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: #ccc;
      padding: 20px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="page">
  <header>
    <div class="header-meta">
      <span class="badge">__VERSION__</span>
      <span>2026 旅行計劃</span>
    </div>
    <h1>Jerry & Hsuan</h1>
    <p class="subtitle">兩趟旅行，兩種心情。</p>
  </header>

  <div class="trips">

    <a href="okinawa.html" class="trip-card okinawa">
      <div class="trip-emoji">🌺</div>
      <div>
        <div class="trip-title">沖繩旅遊</div>
        <div class="trip-subtitle">Okinawa Trip 2026</div>
      </div>
      <div class="trip-meta">
        <div class="meta-row">
          <span class="meta-label">日期</span>
          <span>4/23 – 4/27</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">天數</span>
          <span>5 天 4 夜</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">路線</span>
          <div class="route-chips">
            <span class="chip">🇹🇼 台北</span>
            <span class="chip">→</span>
            <span class="chip">🇯🇵 那霸</span>
            <span class="chip">→</span>
            <span class="chip">古宇利島</span>
          </div>
        </div>
        <div class="meta-row">
          <span class="meta-label">亮點</span>
          <span class="tag okinawa-tag">美麗海水族館</span>
          <span class="tag okinawa-tag">青之洞窟</span>
        </div>
      </div>
      <div class="trip-link">查看行程 →</div>
    </a>

    <a href="oceania.html" class="trip-card oceania">
      <div class="trip-emoji">💍</div>
      <div>
        <div class="trip-title">大洋洲蜜月</div>
        <div class="trip-subtitle">Oceania Honeymoon 2026</div>
      </div>
      <div class="trip-meta">
        <div class="meta-row">
          <span class="meta-label">日期</span>
          <span>4/29 – 5/17</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">天數</span>
          <span>19 天</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">路線</span>
          <div class="route-chips">
            <span class="chip">🇹🇼 台北</span>
            <span class="chip">→</span>
            <span class="chip">🇸🇬 新加坡</span>
            <span class="chip">→</span>
            <span class="chip">🇦🇺 墨爾本</span>
            <span class="chip">→</span>
            <span class="chip">🇳🇿 紐西蘭</span>
          </div>
        </div>
        <div class="meta-row">
          <span class="meta-label">亮點</span>
          <span class="tag oceania-tag">皇后鎮 9 晚</span>
          <span class="tag oceania-tag">米佛峽灣</span>
        </div>
      </div>
      <div class="trip-link">查看行程 →</div>
    </a>

  </div>
</div>

<footer>
  Jerry &amp; Hsuan &nbsp;·&nbsp; __VERSION__ &nbsp;·&nbsp; 2026
</footer>

</body>
</html>
