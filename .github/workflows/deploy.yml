name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject version tag into HTML
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "Version: $TAG"

          if [ ! -d "./docs" ]; then
            echo "::error::docs/ directory not found"
            exit 1
          fi

          mapfile -d '' files < <(find ./docs -name "*.html" -type f -print0)

          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No HTML files found in docs/"
            exit 0
          fi

          for file in "${files[@]}"; do
            sed -i "s/__VERSION__/${TAG}/g" "$file"
            echo "Patched: $file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
